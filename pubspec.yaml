name: badwallet_app
description: "BadWallet Consumer App — Application mobile de gestion de portefeuille."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Requêtes HTTP vers le backend BadWallet
  http: ^1.2.0

  # Gestion d'état
  provider: ^6.1.2

  # Stockage sécurisé (numéro de téléphone, session)
  flutter_secure_storage: ^9.0.0

  # Typographie moderne (Poppins)
  google_fonts: ^6.2.1

  # Formatage des dates et monnaies
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
